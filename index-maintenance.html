<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Under Maintenance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .maintenance-container {
            text-align: center;
        }
        .maintenance-container h1 {
            font-size: 3rem;
            color: #e74c3c;
        }
        .maintenance-container p {
            font-size: 1.2rem;
            margin: 20px 0;
        }
        .maintenance-container a {
            font-size: 1.2rem;
            color: #3498db;
            text-decoration: none;
        }
        .maintenance-container a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        <h1>We'll Be Back Soon!</h1>
        <p>Our website is currently undergoing maintenance. We apologize for the inconvenience and appreciate your patience.</p>
        <p>Please check back later or <a href="mailto:support@example.com">contact us</a> if you need assistance.</p>
    </div>

</body>
</html>
